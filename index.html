<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  

</head>
<body>
    <div id="login-page">
  <div class="login-grid"></div>
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">
        <svg viewBox="0 0 24 24"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
      </div>
      <div class="login-title">GitHub Issues Tracker</div>
      <div class="login-sub">Sign in to manage your issues</div>
    </div>
    <div class="login-form">
      <div id="login-error" class="login-error">Invalid username or password. Please try again.</div>
      <div class="field-group">
        <label class="field-label">Username</label>
        <input id="username-input" class="field-input" type="text" placeholder="Enter Username">
        <span class="field-hint">Default: admin</span>
      </div>
      <div class="field-group">
        <label class="field-label">Password</label>
        <input id="password-input" class="field-input" type="password" placeholder="Enter Password">
        <span class="field-hint">Default: admin123</span>
      </div>
      <button class="login-btn" onclick="handleLogin()">Sign In</button>
      <div class="login-divider">OR</div>
      <div class="demo-creds">
        <p>Demo Credentials:</p>
        <div class="cred-item"><span>Username:</span> admin<br><span>Password:</span> admin123</div>
      </div>
    </div>
  </div>
</div>

<div id="main-app">
    <nav class="navbar">
    <a class="nav-brand" href="#">
      <svg viewBox="0 0 24 24"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
      GitHub Issues Tracker
    </a>
    <div class="nav-right">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search-input" class="search-input" type="text" placeholder="Search issues..." oninput="handleSearch(this.value)">
      </div>
      <button class="new-issue-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        <span>New Issue</span>
      </button>
    </div>
  </nav>
  <div class="content">
    <div class="tabs-row">
      <button class="tab-btn active" onclick="switchTab('all', this)">All</button>
      <button class="tab-btn" onclick="switchTab('open', this)">Open</button>
      <button class="tab-btn" onclick="switchTab('closed', this)">Closed</button>
    </div>
    <div class="issues-header">
      <div class="issues-header-left">
        <div class="issues-icon">🔖</div>
        <div>
          <div class="issues-count" id="issues-count">0 Issues</div>
          <div class="issues-subtitle">Track and manage your project issues</div>
        </div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot open"></div> Open</div>
        <div class="legend-item"><div class="legend-dot closed"></div> Closed</div>
      </div>
    </div>
    <div class="issues-grid" id="issues-grid">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>
  </div>
</div>
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
